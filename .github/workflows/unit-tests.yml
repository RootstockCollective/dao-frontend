name: Unit tests

# --- Cache scoping ---
# GitHub Actions caches are scoped by branch. A workflow run can restore
# caches from its own branch AND the default branch (main), but NOT from
# other feature branches. Caches created on a feature branch are only
# available to that branch. The push trigger already covers main, so
# caches are seeded on the default branch automatically.
on:
  push:
  # Allows manually re-seeding caches from the Actions tab (e.g. after a deps update).
  workflow_dispatch:

# Declare default permissions as read only.
permissions: read-all

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 #v6.2.0
        with:
          node-version-file: '.nvmrc'

      # Caches the full node_modules directory keyed on package-lock.json.
      # On hit, npm ci is skipped entirely. The post-job hook saves the
      # cache after all steps complete (only when the exact key was a miss).
      - name: Cache node_modules
        id: cache-node-modules
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 #v5.0.3
        with:
          path: node_modules
          key: ${{ runner.os }}-node-modules-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        if: steps.cache-node-modules.outputs.cache-hit != 'true'
        env:
          CYPRESS_INSTALL_BINARY: '0'
        run: npm ci

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable

      - name: Start Anvil Fork
        env:
          ROOTSTOCK_RPC_URL: ${{ secrets.ROOTSTOCK_RPC_URL }}
        run: |
          # Fall back to public node if secret is not set
          if [ -z "$ROOTSTOCK_RPC_URL" ]; then
            echo "⚠️ ROOTSTOCK_RPC_URL secret is NOT set — falling back to public node (may be slow/rate-limited)"
            ROOTSTOCK_RPC_URL="https://public-node.rsk.co"
          else
            echo "✅ ROOTSTOCK_RPC_URL secret is set (using private RPC)"
          fi
          # Start Anvil fork in background for swap execution tests
          # Fork is required for testing swap execution (write operations) without spending real funds
          anvil --fork-url $ROOTSTOCK_RPC_URL --chain-id 31337 > /tmp/anvil.log 2>&1 &
          echo $! > /tmp/anvil.pid
          # Wait for fork to be ready (with timeout)
          timeout=30
          counter=0
          while [ $counter -lt $timeout ]; do
            if curl -s -X POST http://127.0.0.1:8545 -H "Content-Type: application/json" \
              -d '{"jsonrpc":"2.0","method":"eth_chainId","params":[],"id":1}' > /dev/null 2>&1; then
              echo "✅ Fork is ready!"
              break
            fi
            sleep 1
            counter=$((counter + 1))
          done
          if [ $counter -eq $timeout ]; then
            echo "❌ Fork failed to start within $timeout seconds"
            cat /tmp/anvil.log
            exit 1
          fi

      - name: Run tests
        env:
          FORK_RPC_URL: http://127.0.0.1:8545
        run: npm run test

      - name: Stop Anvil
        if: always()
        run: |
          if [ -f /tmp/anvil.pid ]; then
            kill $(cat /tmp/anvil.pid) 2>/dev/null || true
          fi
          pkill -f anvil 2>/dev/null || true
